#name: $(year:yy).$(date:MM).$(date:dd).$(Rev:r)

trigger:
 branches:
   include:
     - master

variables:
  - group: keyvault-reader
  - name: vfpAppName
    value: 'Organic.Core.app'
  - name: appPath
    value: '$(Build.SourcesDirectory)/Organic.BusinessLogic/bin/app'
  - name: objPath
    value: '$(Build.SourcesDirectory)/Organic.BusinessLogic/obj/app'
  - name: netCoreVersion
    value: '9.0.203'
  - name: nugetPackageName
    value: 'Organic.Core'
  - name: FeedOrganic
    value: '8d6d83c7-4dd5-4cff-909c-34ba0397d18f'
  - name: productCounter
    value: $[ counter('OrganicCore-version', 10000) ]

resources:
   repositories:
   - repository: templates
     type: git
     name: Dev-Ops/PipelineTemplates
     ref: refs/heads/master

jobs:
- job: BuildAndTest
  displayName: 'Organic.Core - Build, Test & Package'
  pool:
    vmImage: 'windows-2022'
  timeoutInMinutes: 180
  steps:

  - task: UseDotNet@2
    # Instalamos NetCore para poder ejecutar mas adelante doVFP.exe
    displayName: Install NetCore SDK
    inputs:
      packageType: 'sdk'
      version: '$(netCoreVersion)'

  - pwsh: |
      $ErrorActionPreference = 'Stop'

      # Parte 1: (YY - 10), 2 dígitos (2025 -> 15)
      $yy  = [int](Get-Date -Format 'yy')
      $p1  = '{0:00}' -f ($yy - 10)

      # Parte 2: mes en 4 dígitos (septiembre -> 0009)
      $p2  = (Get-Date).Month.ToString('0000')

      # Parte 3: autoincremental de 5 dígitos (persistente entre ejecuciones)
      $ctr = [int]$env:PRODUCTCOUNTER
      $p3  = '{0:00000}' -f $ctr

      $ver = "$p1.$p2.$p3"
      Write-Host "Versión calculada: $ver"
      Write-Host "##vso[task.setvariable variable=ProductVersion]$ver"
      Write-Host "##vso[task.setvariable variable=BuildId]$p3"
    env:
      PRODUCTCOUNTER: $(productCounter)
    displayName: 'Calcular versión de producto'

  - template: Organic/Get_Buildh_Positions.yml@templates
    parameters:
      serviceConnectionName: 'IntegracionesAzureServices'
      productBuildNum: '$(BuildId)'

  - task: PowerShell@2
    # Creamos archivo de configuracion nuget para poder acceder al feed donde esta doVFP para luego bajarlo/instalarlo.
    displayName: 'Create customnugetDoVFP.config'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        $nugetConfig = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="doVFP" value="https://pkgs.dev.azure.com/zoologicnet/_packaging/doVFP/nuget/v3/index.json" />
          </packageSources>
          <packageSourceCredentials>
            <doVFP>
              <add key="Username" value="AzureDevOps" />
              <add key="ClearTextPassword" value="$env:SYSTEM_ACCESSTOKEN" />
            </doVFP>
          </packageSourceCredentials>
        </configuration>
        "@

        $nugetConfig | Out-File -FilePath "$(Build.SourcesDirectory)/customnugetDoVFP.config" -Encoding utf8
    env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  - task: PowerShell@2
    # Creamos archivo de configuracion nuget para poder acceder al feed donde estan los instaladores de Visual FoxPro 9 para luego instalarlos.
    displayName: 'Create customnugetVisualFoxPro9.config'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        $nugetConfig = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="VisualFoxPro9" value="https://pkgs.dev.azure.com/zoologicnet/_packaging/VisualFoxPro9/nuget/v3/index.json" />
          </packageSources>
          <packageSourceCredentials>
            <VisualFoxPro9>
              <add key="Username" value="AzureDevOps" />
              <add key="ClearTextPassword" value="$env:SYSTEM_ACCESSTOKEN" />
            </VisualFoxPro9>
          </packageSourceCredentials>
        </configuration>
        "@

        $nugetConfig | Out-File -FilePath "$(Build.SourcesDirectory)/customnugetVisualFoxPro9.config" -Encoding utf8
    env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  - task: PowerShell@2
    # Instalamos doVFP
    displayName: 'Install doVFP using customnugetDoVFP.config'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        dotnet new tool-manifest --force
        dotnet tool install dovfp --global --configfile "$(Build.SourcesDirectory)/customnugetDoVFP.config"

  - task: PowerShell@2
    # Recuparamos los instaladores de Visual FoxPro 9 que estan almacenados como paquetes nuget. El comando install ya los deja descomprimidos en disco en una carpeta con igual nombre que el paquete.
    displayName: Nuget Restore VisualFoxPro installer
    inputs:
      targetType: 'inline'
      script: |
        Set-Location '$(System.DefaultWorkingDirectory)' 
        & nuget.exe install 'VisualFoxPro9Setup' -Verbosity detailed -Version 9.0.0 -ConfigFile "$(Build.SourcesDirectory)/customnugetVisualFoxPro9.config" -NonInteractive -OutputDirectory 'C:\CustomNugets'
        & nuget.exe install 'VisualFoxPro9SP1' -Verbosity detailed -Version 1.0.0 -ConfigFile "$(Build.SourcesDirectory)/customnugetVisualFoxPro9.config" -NonInteractive -OutputDirectory 'C:\CustomNugets'
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: Install VFP9 Runtime Files
    inputs:
      targetType: 'inline'
      script: |
        $msiPath = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\WCU\bootstrap.msi"
        $arguments = "/i `"$msiPath`" /quiet /norestart"

        $startInfo = New-Object System.Diagnostics.ProcessStartInfo
        $startInfo.FileName = "msiexec.exe"
        $startInfo.Arguments = $arguments
        $startInfo.UseShellExecute = $false
        $startInfo.RedirectStandardOutput = $true
        $startInfo.RedirectStandardError = $true
        $startInfo.CreateNoWindow = $true

        $process = New-Object System.Diagnostics.Process
        $process.StartInfo = $startInfo
        $process.Start() | Out-Null
        $process.WaitForExit()

        $stdout = $process.StandardOutput.ReadToEnd()
        $stderr = $process.StandardError.ReadToEnd()

        Write-Host "STDOUT:"
        Write-Host $stdout

        Write-Host "STDERR:"
        Write-Host $stderr

        if ($process.ExitCode -eq 0)
        {
            Write-Host "Instalación finalizada correctamente."
        }
        else
        {
            Write-Error "Error durante la instalación. Código: $($process.ExitCode)"
        }
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: Install VFP9 Prerequisite [MDAC 2.8]
    inputs:
      targetType: 'inline'
      script: |
        $execFile = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\WCU\mdac28\mdac_typ.exe"
        $params = "/q"

        $psi = [System.Diagnostics.ProcessStartInfo]::new($execFile, $params)
        $psi.WorkingDirectory = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\WCU\mdac28"
        $psi.UseShellExecute = $false
        $psi.RedirectStandardOutput = $true
        $p = [System.Diagnostics.Process]::Start($psi)
        $output = $p.StandardOutput.ReadToEnd()
        $p.WaitForExit()
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: 'Install VFP9 Prerequisite [Windows Installer]'
    inputs:
      targetType: 'inline'
      script: |
        $execFile = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\WCU\windowsinstaller\winnt\instmsiw.exe"
        $params = "/q"

        $psi = [System.Diagnostics.ProcessStartInfo]::new($execFile, $params)
        $psi.WorkingDirectory = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\WCU\windowsinstaller\winnt"
        $psi.UseShellExecute = $false
        $psi.RedirectStandardOutput = $true
        $p = [System.Diagnostics.Process]::Start($psi)
        $output = $p.StandardOutput.ReadToEnd()
        $p.WaitForExit()
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: 'Install Visual FoxPro 9'
    inputs:
      targetType: 'inline'
      script: |
        $execFile = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\Setup\setup.exe"
        $params = "/unattendfile C:\CustomNugets\VisualFoxPro9Setup.9.0.0\foxpro.ini"

        $psi = [System.Diagnostics.ProcessStartInfo]::new($execFile, $params)
        $psi.WorkingDirectory = "C:\CustomNugets\VisualFoxPro9Setup.9.0.0\Visual FoxPro 9\Setup"
        $psi.UseShellExecute = $false
        $psi.RedirectStandardOutput = $true
        $psi.RedirectStandardError = $true
        $p = [System.Diagnostics.Process]::Start($psi)
        $p.WaitForExit()

        $stdout = $p.StandardOutput.ReadToEnd()
        $stderr = $p.StandardError.ReadToEnd()

        Write-Host "STDOUT:"
        Write-Host $stdout

        Write-Host "STDERR:"
        Write-Host $stderr

        # Dejar esto porque el instalador de VFP manda instalar y retorna (queda instalando en background).
        Start-Sleep -Seconds 60
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: 'Install Visual FoxPro 9 SP1'
    inputs:
      targetType: 'inline'
      script: |
        $execFile = "C:\CustomNugets\VisualFoxPro9SP1.1.0.0\VFP9SP1.exe"
        $params = "/q"

        $psi = [System.Diagnostics.ProcessStartInfo]::new($execFile, $params)
        $psi.WorkingDirectory = "C:\CustomNugets\VisualFoxPro9SP1.1.0.0\"
        $psi.UseShellExecute = $false
        $psi.RedirectStandardOutput = $true
        $psi.RedirectStandardError = $true
        $p = [System.Diagnostics.Process]::Start($psi)
        $p.WaitForExit()

        $stdout = $p.StandardOutput.ReadToEnd()
        $stderr = $p.StandardError.ReadToEnd()

        Write-Host "STDOUT:"
        Write-Host $stdout

        Write-Host "STDERR:"
        Write-Host $stderr
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    # Creamos archivo config.fpw para que al instanciar VFP ya tenga algunos seteos por defecto (por ejemplo que no ejecute Task Pane Manager al abrir VFP)
    displayName: 'Create config.fpw'
    inputs:
      targetType: 'inline'
      script: |
        $VFPConfig = @"
        _STARTUP=
        PROGCACHE=0
        "@

        $VFPConfig | Out-File -FilePath "C:\Program Files (x86)\Microsoft Visual FoxPro 9\config.fpw" -Encoding utf8
      failOnStderr: true
      pwsh: true

  - task: PowerShell@2
    displayName: 'Switch dataconfig to LocalDB in vfpproj'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        $vfpproj = "$(Build.SourcesDirectory)/Organic.BusinessLogic/Organic.Core.vfpproj"
        $content = Get-Content $vfpproj -Raw
        $oldValue = 'dataconfig.sqlexpress.ini'
        $newValue = 'dataconfig.localdb.ini'

        if ($content -notmatch [regex]::Escape($oldValue)) {
            Write-Error "ERROR: No se encontró '$oldValue' en $vfpproj"
            exit 1
        }

        $newContent = $content -replace [regex]::Escape($oldValue), $newValue
        Set-Content -Path $vfpproj -Value $newContent -NoNewline
        Write-Host "Cambiado '$oldValue' -> '$newValue' en Organic.Core.vfpproj"

  - task: AzurePowerShell@5
    # Aqui ejecutamos doVFP. Las variables de entorno que utiliza esta tarea es para poder autenticar en Azure y poder obtener un secreto almacenado en Key Vault.
    # Las variables corresponden a la app creada en Azure llamada 'keyvault-reader' que es la que permite acceder a KeyVault.
    displayName: 'Run DoVFP'
    inputs:
      azureSubscription: 'IntegracionesAzureServices'
      ScriptType: 'InlineScript'
      Inline: |
        Write-Host "`Setting default working folder to: $(Build.SourcesDirectory)"
        Set-Location "$(Build.SourcesDirectory)"

        $env:AZURE_CLIENT_ID = "${env:AZURE_CLIENT_ID}"
        $env:AZURE_TENANT_ID = "${env:AZURE_TENANT_ID}"
        $env:AZURE_CLIENT_SECRET = "${env:AZURE_CLIENT_SECRET}"

        Write-Host "`Executing doVFP rebuild..."
        & "dovfp.exe" rebuild -build_debug 2 -logdebug 1 -build_force 1  -build_show_errors 1 -project_version $(ProductVersion) -cache_nuget_only 1

        $ExitCode = $LASTEXITCODE

        if ($ExitCode -eq 0)
        {
          Write-Host "La ejecución fue exitosa."
        }
        else
        {
          throw "La ejecución de doVFP falló con código de retorno: $ExitCode"
        }
      FailOnStandardError: true
      pwsh: true
      azurePowerShellVersion: LatestVersion
    env:
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      PBD1: $(PBD1)
      PBD2: $(PBD2)
      PBD3: $(PBD3)
      PBD4: $(PBD4)
      S1: $(S1)
      S2: $(S2)
      S31: $(S31)
      S41: $(S41)

  - task: PowerShell@2
    displayName: 'Show ERR file content'
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "`Setting default working folder to: $(Build.SourcesDirectory)"
        Set-Location "$(Build.SourcesDirectory)"

        $pathToErr = '$(objPath)'
        if (Test-Path $pathToErr)
        {
          $errFiles = Get-ChildItem -Path $pathToErr -Filter "*.err"

          foreach($file in $errFiles)
          {
            Write-Host "Contenido de $($file)..."
            $content = Get-Content -Path $file -Raw
            Write-Host $content
          }
        }
        else
        {
          Write-Host "No existe la ruta donde se almacenan los archivos ERR." -ForegroundColor Yellow
        }

      failOnStderr: true
      pwsh: true

  # ============================================
  # SETUP LOCALDB Y EJECUCIÓN DE TESTS
  # ============================================

  - task: PowerShell@2
    displayName: 'Start SQL LocalDB'
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "  Iniciando SQL LocalDB" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        # Verificar si LocalDB está instalado
        $localdbPath = Get-Command sqllocaldb -ErrorAction SilentlyContinue
        if (-not $localdbPath) {
            throw "ERROR: sqllocaldb no está instalado en el agente"
        }

        # Iniciar la instancia
        Write-Host "Iniciando instancia MSSQLLocalDB..."
        sqllocaldb start MSSQLLocalDB

        if ($LASTEXITCODE -ne 0) {
            Write-Host "Instancia no existe, creándola..."
            sqllocaldb create MSSQLLocalDB
            sqllocaldb start MSSQLLocalDB
        }

        # Mostrar info
        Write-Host ""
        Write-Host "Estado de LocalDB:" -ForegroundColor Green
        sqllocaldb info MSSQLLocalDB

        # Verificar conexión
        Write-Host ""
        Write-Host "Verificando conexión..."
        sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT @@VERSION" -b

        if ($LASTEXITCODE -ne 0) {
            throw "ERROR: No se pudo conectar a LocalDB"
        }

        Write-Host ""
        Write-Host "✓ LocalDB iniciado y verificado correctamente" -ForegroundColor Green
      failOnStderr: false
      pwsh: true

  - task: PowerShell@2
    displayName: 'Run ADN Implant'
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "  Ejecutando ADN Implant" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        Set-Location "$(Build.SourcesDirectory)"

        # Verificar que dataconfig.ini tiene LocalDB configurado
        $dataconfigPath = "Organic.BusinessLogic/bin/App/dataconfig.ini"
        Write-Host "Contenido de dataconfig.ini:"
        Get-Content $dataconfigPath

        # Ejecutar ADN Implant
        Write-Host ""
        Write-Host "Ejecutando run-adnImplant.ps1..."
        .\run-adnImplant.ps1

        $ExitCode = $LASTEXITCODE

        if ($ExitCode -ne 0) {
            throw "ERROR: ADN Implant falló con código: $ExitCode"
        }

        # Verificar bases de datos creadas
        Write-Host ""
        Write-Host "Bases de datos creadas:" -ForegroundColor Green
        sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT name FROM sys.databases WHERE name LIKE '%NUCLEO%' ORDER BY name" -b

        if ($LASTEXITCODE -ne 0) {
            throw "ERROR: No se pudieron verificar las bases de datos"
        }

        Write-Host ""
        Write-Host "✓ ADN Implant ejecutado correctamente" -ForegroundColor Green
      failOnStderr: false
      pwsh: true

  - task: PowerShell@2
    displayName: 'Show ADN Implant Logs'
    condition: always()
    inputs:
      targetType: 'inline'
      script: |
        $logPath = "$(Build.SourcesDirectory)/Organic.BusinessLogic/bin/App/Log"

        if (Test-Path $logPath) {
            Write-Host "========================================" -ForegroundColor Cyan
            Write-Host "  Logs de ADN Implant" -ForegroundColor Cyan
            Write-Host "========================================" -ForegroundColor Cyan

            Get-ChildItem -Path $logPath -Filter "*.log" | ForEach-Object {
                Write-Host ""
                Write-Host "=== $($_.Name) ===" -ForegroundColor Yellow
                Get-Content $_.FullName -Tail 100
            }
        } else {
            Write-Host "No se encontró carpeta de logs: $logPath" -ForegroundColor Yellow
        }
      pwsh: true

  - task: PowerShell@2
    displayName: 'Install Test Prerequisites'
    inputs:
      targetType: 'inline'
      script: |
        Set-Location "$(Build.SourcesDirectory)"
        .\install-test-prerequisites.ps1

        if ($LASTEXITCODE -ne 0) {
            throw "ERROR: Instalacion de prerequisitos fallo con codigo: $LASTEXITCODE"
        }
      failOnStderr: false
      pwsh: true

  - task: PowerShell@2
    displayName: 'Run Tests'
    continueOnError: true
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "  Ejecutando Tests" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        Set-Location "$(Build.SourcesDirectory)"

        # Crear carpeta TestResults si no existe
        $testResultsPath = "$(Build.SourcesDirectory)/Organic.Tests/TestResults"
        if (-not (Test-Path $testResultsPath)) {
            New-Item -ItemType Directory -Path $testResultsPath -Force | Out-Null
        }

        Write-Host "Ejecutando dovfp test..."
        & "dovfp.exe" test -test_format junit -test_parallel 8 -test_verbose 1 -test_timeout 120 -test_coverage 0 -test_coverage_format cobertura

        $ExitCode = $LASTEXITCODE

        # Listar archivos de resultados generados
        Write-Host ""
        Write-Host "Archivos de resultados generados:"
        Get-ChildItem -Path "$(Build.SourcesDirectory)" -Filter "*.xml" -Recurse | Where-Object { $_.DirectoryName -like "*TestResults*" } | ForEach-Object { Write-Host $_.FullName }

        if ($ExitCode -ne 0) {
            Write-Host "##vso[task.logissue type=warning]Tests fallaron con código: $ExitCode"
            Write-Host "⚠️ Tests terminaron con errores (código: $ExitCode) - pipeline continúa" -ForegroundColor Yellow
        } else {
            Write-Host ""
            Write-Host "✓ Tests ejecutados correctamente" -ForegroundColor Green
        }
      failOnStderr: false
      pwsh: true

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TestResults/test-results_*.xml'   # <-- más específico
      searchFolder: '$(Build.SourcesDirectory)'
      mergeTestResults: true
      failTaskOnFailedTests: false
      testRunTitle: 'Organic.Core Tests - $(Build.BuildNumber)'
      publishRunAttachments: true
    condition: always()

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish Code Coverage'
    inputs:
      summaryFileLocation: '$(Build.SourcesDirectory)/**/TestResults/coverage_*.cobertura.xml'
    condition: always()

  - publish: $(Build.SourcesDirectory)/Organic.Tests/TestResults
    artifact: CodeCoverageReport
    displayName: 'Publish Coverage as Artifact'
    condition: always()

  # ============================================
  # FIN DE TESTS - EMPAQUETADO
  # ============================================

  - task: PowerShell@2
    # Creamos archivo nuspec que indica como queremos empaquetar algo con nuget. En este caso el archivo app que resulta de todo el proceso.
    displayName: 'Create .nuspec file'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    inputs:
      targetType: 'inline'
      script: |
        $nuspecFile = Join-Path -Path '$(appPath)' -ChildPath '$(nugetPackageName).nuspec'
        Write-Output "Ruta y nombre de archivo NUSPEC: $($nuspecFile)"

        $SymbolFile = [System.IO.Path]::ChangeExtension("$(vfpAppName)", ".symbols")

        $nuspec = @"
        <?xml version="1.0"?>
        <package >
          <metadata>
            <id>$(nugetPackageName)</id>
            <version>$(ProductVersion)</version>
            <authors>Zoo Logic S.A.</authors>
            <description>Paquete generado automáticamente desde Azure DevOps Pipelines</description>
          </metadata>
          <files>
            <file src="$(vfpAppName)" target="lib" />
            <file src="$SymbolFile" target="lib" />
          </files>
        </package>
        "@

        $nuspec | Set-Content $nuspecFile

  - task: NuGetCommand@2
    # Creamos el paquete nuget utilizando el archivo creado anteriormente.
    displayName: 'Create Nuget file'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    inputs:
      command: 'pack'
      packagesToPack: '$(appPath)/$(nugetPackageName).nuspec'
      packDestination: '$(appPath)'

  - task: DotNetCoreCLI@2
    displayName: 'Publish package'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    inputs:
      azureSubscription: 'IntegracionesAzureServices'
      command: 'push'
      packagesToPush: '$(appPath)/*.nupkg'
      nuGetFeedType: 'internal'
      publishVstsFeed: $(FeedOrganic)
      publishPackageMetadata: false
